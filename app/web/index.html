<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Potoos — a private space for the people who were actually there. Every photo and video, exactly as you took it.">
  <meta name="theme-color" content="#21070D">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS / Safari PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Potoos">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Potoos</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Capture the browser's install prompt so we can show it at the right moment.
    // We prevent the automatic mini-bar and trigger it ourselves via Flutter.
    window._deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window._deferredInstallPrompt = e;
    });

    window.addEventListener('appinstalled', function() {
      window._deferredInstallPrompt = null;
    });

    // Called by Flutter to check if the custom prompt is available
    function pwaInstallAvailable() {
      return !!window._deferredInstallPrompt;
    }

    // Called by Flutter to trigger the browser's native install dialog
    function pwaPromptInstall() {
      if (!window._deferredInstallPrompt) return;
      window._deferredInstallPrompt.prompt();
      window._deferredInstallPrompt.userChoice.then(function() {
        window._deferredInstallPrompt = null;
      });
    }

    // True when running as an installed PWA (standalone mode)
    function pwaIsInstalled() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
